<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Medical Quiz | Student</title>
    <!-- 1. رابط الأيقونات الكامل (لإظهار علامة الزائد وسلة المهملات) -->
    <!-- <link rel="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet"> -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">


    <!-- 2. رابط التنسيق الكامل (لضبط شكل الجداول والأزرار) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <!-- 3. رابط الخط الاحترافي (اختياري لجعل الخط مثل الصورة تماماً) -->
    <link rel="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style P quize.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="js/quiz-logic.js"></script>
</head>

<body>
    <div class="main-card shadow">

        <a href="manage.html"
            style="position: absolute; top: 20px; right: 25px; text-decoration: none; font-size: 20px;">⚙️</a>

        <div id="start-view">
            <div class="display-1 mb-3">🩺</div>
            <h2 class="fw-bold">Anatomy Quiz</h2>
            <button class="btn btn-primary btn-lg w-100 py-3 rounded-pill mt-4" onclick="startQuiz()">Start Exam
                🚀</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="timer" class="timer-ring">30</div>
            <div class="progress mb-4">
                <div id="p-bar" class="progress-bar" style="width: 0%"></div>
            </div>
            <h4 id="q-text" class="fw-bold mb-4"></h4>
            <div id="options-box"></div>
            <button id="nxt" class="btn btn-dark btn-lg w-100 py-3 rounded-pill mt-4" disabled onclick="nextQ()">Next
                ➡️</button>
        </div>

        <div id="result-view" class="hidden">
            <h1>🎓</h1>
            <h2 id="res-score" class="display-4 fw-bold text-primary"></h2>
            <div id="res-msg" class="h4 p-3 mb-4"></div>
            <button id="pdf-btn" class="btn btn-success w-100 py-3 rounded-pill hidden" onclick="downloadPDF()">Download
                Certificate 📄</button>
            <button class="btn btn-outline-primary w-100 py-3 rounded-pill mt-2" onclick="location.reload()">Restart
                🔄</button>
        </div>
    </div>


    <div style="position: absolute; left: -9999px;">
        <div id="pdf-content" style="padding: 50px; border: 10px solid #0062ff; text-align: center; width: 800px;">
            <h1>CERTIFICATE OF COMPLETION</h1>
            <hr>
            <h3>ANATOMY MEDICAL EXAM</h3>
            <p>Score: <span id="cert-score"></span></p>
            <p>Date: <span id="cert-date"></span></p>
        </div>
    </div>


</body>

</html>
